name: Build and Push Docker Image

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v2.5.0 or latest)'
        required: false
        default: 'latest'
        type: string
      push_to_registry:
        description: 'Push to GitHub Container Registry'
        required: false
        default: true
        type: boolean
      platforms:
        description: 'Platforms to build (comma-separated)'
        required: false
        default: 'linux/amd64,linux/arm64,linux/arm/v7,linux/arm/v6'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      if: github.event_name != 'pull_request' && inputs.push_to_registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Download EasyTier binaries
      run: |
        mkdir -p build
        
        # 复制 Dockerfile 和 scripts 到 build 目录
        cp Dockerfile build/
        cp -r scripts/ build/scripts/
        
        cd build
        
        # Get latest release from EasyTier
        LATEST_RELEASE=$(curl -s https://api.github.com/repos/EasyTier/EasyTier/releases/latest | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
        echo "Downloading EasyTier $LATEST_RELEASE"
        
        # Download and extract all architectures
        # Create directories matching TARGETPLATFORM format
        # File format: easytier-linux-${ARCH}-${VERSION}.zip, extracts to 'easytier'
        ARCHIVE_MAP=(
          "x86_64:easytier-linux-x86_64"
          "aarch64:easytier-linux-aarch64"
          "armv7hf:easytier-linux-armv7hf"
          "armhf:easytier-linux-armhf"
          "riscv64:easytier-linux-riscv64"
        )
        
        for mapping in "${ARCHIVE_MAP[@]}"; do
          ARCH_DIR="${mapping%%:*}"
          ARCHIVE_BASE="${mapping##*:}"
          ARCHIVE_NAME="${ARCHIVE_BASE}-${LATEST_RELEASE}"
          URL="https://github.com/EasyTier/EasyTier/releases/download/$LATEST_RELEASE/${ARCHIVE_NAME}.zip"
          echo "Downloading $ARCHIVE_NAME..."
          
          # Create temp dir for extraction
          TEMP_DIR="temp_${ARCH_DIR}"
          mkdir -p "$TEMP_DIR"
          cd "$TEMP_DIR"
          
          if curl -L -o "${ARCHIVE_NAME}.zip" "$URL" 2>/dev/null && unzip -o "${ARCHIVE_NAME}.zip"; then
            # List extracted contents for debugging
            echo "Extracted contents:"
            ls -laR . | head -20
            
            # Find the easytier binary (may be in subdirectory)
            EASYTIER_BIN=$(find . -name "easytier" -type f 2>/dev/null | head -n1)
            if [ -n "$EASYTIER_BIN" ]; then
              cd ..
              mkdir -p "$ARCH_DIR"
              cp "$TEMP_DIR/$EASYTIER_BIN" "$ARCH_DIR/easytier"
              chmod +x "$ARCH_DIR/easytier"
              echo "✓ Extracted $ARCH_DIR/easytier"
            else
              cd ..
              echo "✗ Warning: easytier binary not found in $ARCHIVE_NAME"
              echo "Contents of $TEMP_DIR:"
              ls -la "$TEMP_DIR" || true
            fi
            rm -rf "$TEMP_DIR"
          else
            cd ..
            echo "✗ Warning: Failed to download $ARCHIVE_NAME"
          fi
        done
        
        echo ""
        echo "=== Build directory structure ==="
        ls -la
        for dir in x86_64 aarch64 armv7hf armhf riscv64; do
          if [ -d "$dir" ]; then
            echo "--- $dir ---"
            ls -la "$dir"
          fi
        done

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: |
          ghcr.io/${{ github.repository }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=raw,value=${{ github.event.inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' }}
          type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' && github.event_name != 'workflow_dispatch' }}

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: ./build
        file: ./build/Dockerfile
        platforms: ${{ github.event.inputs.platforms || 'linux/amd64,linux/arm64,linux/arm/v7,linux/arm/v6' }}
        push: ${{ github.event_name != 'pull_request' && (github.event.inputs.push_to_registry != 'false' || github.event_name != 'workflow_dispatch') }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
